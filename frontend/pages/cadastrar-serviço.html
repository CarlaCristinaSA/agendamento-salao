<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Serviço</title>
    <link rel="stylesheet" href="../css/cadastrar-serviço.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- TOPO (fora do card) -->
        <div class="header">
            <div class="icon">
                <img src="../assets/iconeEstrelinha.png" alt="icone">
            </div>
            <h1>Cadastrar Serviço</h1>
            <p>Adicione um novo serviço ao seu portfólio</p>
        </div>

        <!-- CARD -->
        <div class="card">
            <form id="formServico">

                <label>Nome do serviço</label>
                <input type="text" id="nome" placeholder="Ex: Corte de cabelo feminino">

                <label>Duração do serviço (em minutos)</label>
                <input type="number" id="duracao" placeholder="Ex: 120">

                <label>Valor do serviço</label>
                <input type="text" id="valor" placeholder="R$ 0,00">

                <button type="submit">CONFIRMAR CADASTRO</button>

            </form>

            <small>Após o cadastro, o serviço estará disponível para agendamento</small>
        </div>

    </div>

    <script src="../js/cadastrar-serviço.js"></script>
</body>

</html>
