<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços Disponíveis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/agendamentoCliente.css">
    <link rel="stylesheet" href="../css/modalAgendarHorario.css">
</head>
<body>
    <!-- ─── PÁGINA PRINCIPAL ─────────────────────────────────────────────── -->
    <div class="container">
        <header class="header">
            <div class="header-icon">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h1>Serviços Disponíveis</h1>
            <p>Escolha o serviço perfeito para você</p>
        </header>
        <div class="services-grid" id="services-container">
            <p class="empty-message">Carregando serviços...</p>
        </div>
    </div>

    <!-- ─── MODAL: AGENDAR HORÁRIO ───────────────────────────────────────── -->
    <div id="modal-agendar-overlay" class="modal-overlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-scroll">
                <div class="modal-scroll">
                    <div class="modal-header">
                        <div class="modal-header-text">
                        <h2 id="modal-title">Agendar Horário</h2>
                        <span id="modal-nome-servico"></span>
                    </div>
                    <button class="modal-close" id="modal-close-btn" aria-label="Fechar">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div>
                    <div class="calendar-nav">
                        <div class="calendar-days" id="calendar-days"></div>
                        <button class="cal-arrow" id="cal-prev" aria-label="Mês anterior">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div class="cal-month">
                            <i class="fa-regular fa-calendar"></i>
                            <span id="cal-month-label"></span>
                        </div>
                        <button class="cal-arrow" id="cal-next" aria-label="Próximo mês">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <!-- Horários -->
                <div class="times-section" id="times-section" style="display:none">
                    <div class="times-label">
                        <i class="fa-regular fa-clock"></i>
                        <span>Horários Disponíveis</span>
                    </div>
                    <div class="times-grid" id="times-grid"></div>
                    <button class="modal-confirm-btn" id="modal-confirm-btn" disabled>CONFIRMAR HORÁRIO</button>                    
                </div>
            </div>
            </div>
        </div>
    </div>

    <script src="../js/modalAgendarHorario.js"></script>
    <script src="../js/agendamentoCliente.js"></script>
</body>
</html>
