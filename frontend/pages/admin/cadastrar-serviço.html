<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Serviço</title>
    <link rel="stylesheet" href="../../css/cadastrar-serviço.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- TOPO (fora do card) -->
        <div class="header">
            <div class="icon">
                <img src="../../assets/iconeEstrelinha.png" alt="icone">
            </div>
            <h1>Cadastrar Serviço</h1>
            <p>Adicione um novo serviço ao seu portfólio</p>
        </div>

        <!-- CARD -->
        <div class="card">
            <form id="formServico">

                <label>Nome do serviço</label>
                <input type="text" id="nome" placeholder="Ex: Corte de cabelo feminino">

                <label>Duração do serviço (em minutos)</label>
                <input type="number" id="duracao" placeholder="Ex: 120">

                <label>Valor do serviço</label>
                <input type="text" id="valor" placeholder="R$ 0,00">

                <button type="submit">CONFIRMAR CADASTRO</button>

            </form>

            <small>Após o cadastro, o serviço estará disponível para agendamento</small>
        </div>

    </div>

    <div id="modal-confirmado-overlay" class="modal-overlay">
        <div class="modal modal-confirmado" role="dialog" aria-modal="true">
            <div class="confirmado-body">
                <div class="confirmado-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="confirmado-title">Confirmado!</h2>
                <p class="confirmado-subtitle">Seu cadastro foi realizado com sucesso</p>
                <div class="confirmado-details">
                    <div class="detail-row">
                        <span class="detail-label">Serviço</span>
                        <span class="detail-value" id="conf-nome">Nome do Serviço</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Duração</span>
                        <span class="detail-value" id="conf-duracao">0 min</span>
                    </div>
                    <div class="detail-row highlight">
                        <span class="detail-label">Valor</span>
                        <span class="detail-value" id="conf-valor">R$ 0,00</span>
                    </div>
                </div>
                <button class="modal-confirm-btn" id="btn-ok-confirmado">OK</button>
            </div>
        </div>
    </div>

    <script src="../../js/cadastrar-serviço.js"></script>
</body>

</html>
