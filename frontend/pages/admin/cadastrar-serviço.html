<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Serviço</title>
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css/cadastrar-servico.css">
    <link rel="stylesheet" href="/frontend/css/btn-voltar.css">
</head>

<body>
    <div class="container">
        <div class="btn-voltar-wrapper">
            <a href="/frontend/pages/admin/listar-serviço.html" class="btn-voltar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M10 3L5 8L10 13" stroke="#E0456A" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
        </div>

        <header class="header">
            <div class="header-icon">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h1>Cadastrar Serviço</h1>
            <p>Adicione um novo serviço ao seu portfólio</p>
        </header>
        <div class="card">
            <form id="formServico">
                <div class="field-group">
                    <label for="nome">Nome do serviço</label>
                    <input type="text" id="nome" placeholder="Ex: Corte de cabelo feminino" autocomplete="off">
                    <span class="error-msg" id="error-nome"></span>
                </div>
                <div class="field-group">
                    <label for="duracao">Duração do serviço (em minutos)</label>
                    <input type="text" id="duracao" placeholder="Ex: 120" autocomplete="off">
                    <span class="error-msg" id="error-duracao"></span>
                </div>
                <div class="field-group">
                    <label for="valor">Valor do serviço</label>
                    <input type="text" id="valor" placeholder="R$ 0,00" autocomplete="off">
                    <span class="error-msg" id="error-valor"></span>
                </div>
                <button type="submit" class="confirm-btn">CONFIRMAR CADASTRO</button>
            </form>
        </div>
        <small>Após o cadastro, o serviço estará disponível para agendamento</small>
    </div>

    <div id="modal-confirmado-overlay" class="modal-overlay">
        <div class="modal-confirmado" role="dialog" aria-modal="true">
            <div class="confirmado-body">
                <div class="confirmado-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="confirmado-title">Confirmado!</h2>
                <p class="confirmado-subtitle">O serviço foi cadastrado com sucesso e já está disponível.</p>
                <div class="confirmado-details">
                    <div class="detail-row">
                        <span class="detail-label">Serviço</span>
                        <span class="detail-value" id="conf-nome">Nome do Serviço</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Duração</span>
                        <span class="detail-value" id="conf-duracao">0 minutos</span>
                    </div>
                    <div class="detail-row highlight">
                        <span class="detail-label">Valor</span>
                        <span class="detail-value" id="conf-valor">R$ 0,00</span>
                    </div>
                </div>
                <button class="modal-confirm-btn" id="btn-ok-confirmado">OK</button>
            </div>
        </div>
    </div>

    <script src="../../js/cadastrar-servico.js"></script>
</body>

</html>
