<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Serviço</title>
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css/cadastrar-servico.css">
</head>

<body>

    <div class="container">
        <header class="header">
            <div class="header-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.5932 18.0833C11.489 17.6796 11.2786 17.3111 10.9837 17.0163C10.6889 16.7214 10.3204 16.511 9.91667 16.4068L2.75917 14.5612C2.63705 14.5265 2.52958 14.453 2.45305 14.3517C2.37652 14.2504 2.33511 14.1269 2.33511 14C2.33511 13.8731 2.37652 13.7496 2.45305 13.6483C2.52958 13.547 2.63705 13.4735 2.75917 13.4388L9.91667 11.592C10.3203 11.4879 10.6886 11.2777 10.9835 10.983C11.2783 10.6884 11.4888 10.3202 11.5932 9.91667L13.4388 2.75917C13.4731 2.63657 13.5466 2.52857 13.648 2.45163C13.7495 2.37469 13.8733 2.33304 14.0006 2.33304C14.1279 2.33304 14.2517 2.37469 14.3531 2.45163C14.4546 2.52857 14.528 2.63657 14.5623 2.75917L16.4068 9.91667C16.511 10.3204 16.7214 10.6889 17.0163 10.9837C17.3111 11.2786 17.6796 11.489 18.0833 11.5932L25.2408 13.4377C25.3639 13.4716 25.4725 13.545 25.5498 13.6466C25.6272 13.7482 25.6691 13.8723 25.6691 14C25.6691 14.1277 25.6272 14.2518 25.5498 14.3534C25.4725 14.455 25.3639 14.5284 25.2408 14.5623L18.0833 16.4068C17.6796 16.511 17.3111 16.7214 17.0163 17.0163C16.7214 17.3111 16.511 17.6796 16.4068 18.0833L14.5612 25.2408C14.5269 25.3634 14.4534 25.4714 14.352 25.5484C14.2505 25.6253 14.1267 25.667 13.9994 25.667C13.8721 25.667 13.7483 25.6253 13.6469 25.5484C13.5454 25.4714 13.472 25.3634 13.4377 25.2408L11.5932 18.0833Z" stroke="white" stroke-width="2.33333" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M23.3333 3.5V8.16667" stroke="white" stroke-width="2.33333" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M25.6667 5.83333H21" stroke="white" stroke-width="2.33333" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4.66666 19.8333V22.1667" stroke="white" stroke-width="2.33333" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5.83333 21H3.5" stroke="white" stroke-width="2.33333" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>

            </div>
            <h1>Cadastrar Serviço</h1>
            <p>Adicione um novo serviço ao seu portfólio</p>
        </header>
        <div class="card">
            <form id="formServico">
                <div class="field-group">
                    <label for="nome">Nome do serviço</label>
                    <input type="text" id="nome" placeholder="Ex: Corte de cabelo feminino" autocomplete="off">
                    <span class="error-msg" id="error-nome"></span>
                </div>
                <div class="field-group">
                    <label for="duracao">Duração do serviço (em minutos)</label>
                    <input type="text" id="duracao" placeholder="Ex: 120" autocomplete="off">
                    <span class="error-msg" id="error-duracao"></span>
                </div>
                <div class="field-group">
                    <label for="valor">Valor do serviço</label>
                    <input type="text" id="valor" placeholder="R$ 0,00" autocomplete="off">
                    <span class="error-msg" id="error-valor"></span>
                </div>
                <button type="submit" class="confirm-btn">CONFIRMAR CADASTRO</button>
            </form>
        </div>
        <small>Após o cadastro, o serviço estará disponível para agendamento</small>
    </div>

    <div id="modal-confirmado-overlay" class="modal-overlay">
        <div class="modal-confirmado" role="dialog" aria-modal="true">
            <div class="confirmado-body">
                <div class="confirmado-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="confirmado-title">Confirmado!</h2>
                <p class="confirmado-subtitle">O serviço foi cadastrado com sucesso e já está disponível.</p>
                <div class="confirmado-details">
                    <div class="detail-row">
                        <span class="detail-label">Serviço</span>
                        <span class="detail-value" id="conf-nome">Nome do Serviço</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Duração</span>
                        <span class="detail-value" id="conf-duracao">0 minutos</span>
                    </div>
                    <div class="detail-row highlight">
                        <span class="detail-label">Valor</span>
                        <span class="detail-value" id="conf-valor">R$ 0,00</span>
                    </div>
                </div>
                <button class="modal-confirm-btn" id="btn-ok-confirmado">OK</button>
            </div>
        </div>
    </div>

    <script src="../../js/cadastrar-servico.js"></script>
</body>

</html>
