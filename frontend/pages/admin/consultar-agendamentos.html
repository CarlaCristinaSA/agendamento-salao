<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos Cadastrados</title>
    <link rel="stylesheet" href="../../css/consultar-agendamentos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600&family=Montserrat:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/modais-consultar-agendamentos.css">
</head>
<body>

<svg style="display:none">
    <defs>
        <symbol id="icone-calendario" viewBox="0 0 18 18" fill="none">
            <path d="M6 1.5V4.5M12 1.5V4.5M14.25 3H3.75C2.92 3 2.25 3.67 2.25 4.5V15C2.25 15.83 2.92 16.5 3.75 16.5H14.25C15.08 16.5 15.75 15.83 15.75 15V4.5C15.75 3.67 15.08 3 14.25 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2.25 6.75H15.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
        <symbol id="icone-relogio" viewBox="0 0 18 18" fill="none">
            <path d="M9 16.5C13.1421 16.5 16.5 13.1421 16.5 9C16.5 4.85786 13.1421 1.5 9 1.5C4.85786 1.5 1.5 4.85786 1.5 9C1.5 13.1421 4.85786 16.5 9 16.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 4.5V9L12 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
    </defs>
</svg>

<div class="pagina">
    <header class="topo">
        <div>
            <h1>Agendamentos</h1>
            <p>Gerencie todos os agendamentos do salão</p>
        </div>
        <div class="acoes-topo">
            <button class="btn-contorno" onclick="abrirFiltro()">
                <svg width="17" height="16" viewBox="0 0 17 16" fill="none">
                    <path d="M1.5 2.667h14M4.833 8h7.334M7.5 13.333h2" stroke="#E0456A" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Filtrar
            </button>
            <button class="btn-contorno" onclick="abrirOrdenacao()">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M3 4.5h12M3 9h8M3 13.5h4" stroke="#110E29" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Ordenar
            </button>
        </div>
    </header>

    <div class="lista-agendamentos" id="containerAgendamentos">
        </div>
</div>

<!-- MODAIS-->
<!-- Modal: Detalhamento-->

<div id="overlay"></div>

<div class="modal" id="modalDetalhamento">
    <div class="topo-modal">
        <h2 id="detalheNomeCliente">Nome do Cliente</h2>
        <button class="btn-fechar" onclick="fecharDetalhamento()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
    
    <div class="corpo-modal detalhamento">
        <div class="linha-detalhe">
            <span class="rotulo">Serviço</span>
            <strong id="detalheServico">--</strong>
        </div>
        <div class="linha-detalhe">
            <span class="rotulo">Profissional</span>
            <strong id="detalheProfissional">--</strong>
        </div>
        <div class="linha-detalhe">
            <span class="rotulo">Data do Agendamento</span>
            <strong id="detalheData">--/--/----</strong>
        </div>
        <div class="linha-detalhe">
            <span class="rotulo">Horário</span>
            <strong id="detalheHorario">--:--</strong>
        </div>
        <div class="linha-detalhe">
            <span class="rotulo">Status</span>
            <strong id="detalheStatus">--</strong>
        </div>
    </div>
    
    <div class="acoes-modal">
        <button class="btn-contorno" onclick="fecharDetalhamento()">Voltar</button>
    </div>
</div>

<!-- Modal: Filtro-->
<div class="modal" id="modalFiltro">
    <div class="topo-modal">
        <h2>Filtrar por</h2>
    </div>
    
    <div class="corpo-modal">
        <div class="grupo-filtro">
            <label class="subtitulo">Status do Agendamento</label>
            <select id="filtroStatus" class="input-padrao">
                <option value="">Todos os status</option>
                <option value="PENDENTE">Pendente</option>
                <option value="CONCLUIDO">Concluído</option>
                <option value="CANCELADO">Cancelado</option>
            </select>
        </div>
        
        <div class="grupo-filtro">
            <label class="subtitulo">Data de Agendamento</label>
            <input type="date" id="filtroDataEspecifica" class="input-padrao" style="margin-bottom: 0.5rem;">
            
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="date" id="filtroDataInicio" class="input-padrao">
                <span style="color: var(--cinza); font-size: 0.875rem;">até</span>
                <input type="date" id="filtroDataFim" class="input-padrao">
            </div>
        </div>
    </div>
    
    <div class="rodape-modal">
        <button class="btn-secundario" onclick="limparFiltros()">Limpar</button>
        <button class="btn-primario" onclick="aplicarFiltro()">Aplicar</button>
    </div>
</div>

<script src="../../js/modais-consultar-agendamentos.js"></script>
<script src="../../js/consultar-agendamentos.js"></script>
</body>
</html>
