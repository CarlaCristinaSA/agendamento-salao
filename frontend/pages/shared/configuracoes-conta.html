      <h1 class="page-title">Configurações da Conta</h1>
      <p class="page-subtitle">Gerencie as informações da sua conta</p>
    </header>

    <section class="data-card" aria-label="Dados da conta">
      <div class="fields-group">

        <div class="field-group">
          <label class="field-label" for="input-nome">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12.6667 14V12.6667C12.6667 11.9594 12.3858 11.2811 11.8857 10.781C11.3856 10.281 10.7073 10 10 10H6.00004C5.2928 10 4.61452 10.281 4.11442 10.781C3.61433 11.2811 3.33337 11.9594 3.33337 12.6667V14" stroke="#E0456A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8.00004 7.33333C9.4728 7.33333 10.6667 6.13943 10.6667 4.66667C10.6667 3.19391 9.4728 2 8.00004 2C6.52728 2 5.33337 3.19391 5.33337 4.66667C5.33337 6.13943 6.52728 7.33333 8.00004 7.33333Z" stroke="#E0456A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Nome</span>
          </label>
          <div class="input-wrapper">
            <input
              class="field-input"
              type="text"
              id="input-nome"
              name="nome"
              autocomplete="name"
              placeholder="Seu nome completo"
              value="Maria Silva Santos"
              disabled
            />
            <button class="edit-btn" type="button" aria-label="Editar nome">
              <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M15.8805 5.10904C16.277 4.71261 16.4998 4.17489 16.4999 3.61418C16.4999 3.05347 16.2773 2.5157 15.8808 2.11917C15.4844 1.72263 14.9467 1.49983 14.386 1.49976C13.8253 1.49969 13.2875 1.72236 12.891 2.11879L2.88145 12.1305C2.70732 12.3042 2.57854 12.5179 2.50645 12.753L1.5157 16.017C1.49632 16.0819 1.49485 16.1508 1.51146 16.2164C1.52807 16.2821 1.56214 16.342 1.61005 16.3898C1.65796 16.4376 1.71792 16.4716 1.78357 16.4881C1.84922 16.5046 1.91812 16.503 1.98295 16.4835L5.2477 15.4935C5.48258 15.4221 5.69633 15.2941 5.8702 15.1208L15.8805 5.10904Z" stroke="#717182" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="error-nome" role="alert"></span>
        </div>

        <div class="field-group">
          <label class="field-label" for="input-telefone">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

              </g>
              <defs><clipPath id="clip0_t"><rect width="16" height="16" fill="white"/></clipPath></defs>
            </svg>
            <span>Telefone</span>
          </label>
          <div class="input-wrapper">
            <input
              class="field-input"
              type="tel"
              id="input-telefone"
              name="telefone"
              autocomplete="tel"
              placeholder="(XX) 9XXXX-XXXX"
              value="(11) 98765-4321"
              maxlength="16"
              inputmode="numeric"
              disabled
            />
            <button class="edit-btn" type="button" aria-label="Editar telefone">
              <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M15.8805 5.10904C16.277 4.71261 16.4998 4.17489 16.4999 3.61418C16.4999 3.05347 16.2773 2.5157 15.8808 2.11917C15.4844 1.72263 14.9467 1.49983 14.386 1.49976C13.8253 1.49969 13.2875 1.72236 12.891 2.11879L2.88145 12.1305C2.70732 12.3042 2.57854 12.5179 2.50645 12.753L1.5157 16.017C1.49632 16.0819 1.49485 16.1508 1.51146 16.2164C1.52807 16.2821 1.56214 16.342 1.61005 16.3898C1.65796 16.4376 1.71792 16.4716 1.78357 16.4881C1.84922 16.5046 1.91812 16.503 1.98295 16.4835L5.2477 15.4935C5.48258 15.4221 5.69633 15.2941 5.8702 15.1208L15.8805 5.10904Z" stroke="#717182" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="error-telefone" role="alert"></span>
        </div>

        <div class="field-group">
          <label class="field-label" for="input-email">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M13.3334 2.66675H2.66671C1.93033 2.66675 1.33337 3.2637 1.33337 4.00008V12.0001C1.33337 12.7365 1.93033 13.3334 2.66671 13.3334H13.3334C14.0698 13.3334 14.6667 12.7365 14.6667 12.0001V4.00008C14.6667 3.2637 14.0698 2.66675 13.3334 2.66675Z" stroke="#E0456A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14.6667 4.66675L8.68671 8.46675C8.48089 8.5957 8.24292 8.66409 8.00004 8.66409C7.75716 8.66409 7.51919 8.5957 7.31337 8.46675L1.33337 4.66675" stroke="#E0456A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>E-mail</span>
          </label>
          <div class="input-wrapper">
            <input
              class="field-input"
              type="email"
              id="input-email"
              name="email"
              autocomplete="email"
              placeholder="seu@email.com"
              value="maria.santos@email.com"
              inputmode="email"
              disabled
            />
            <button class="edit-btn" type="button" aria-label="Editar e-mail">
              <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M15.8805 5.10904C16.277 4.71261 16.4998 4.17489 16.4999 3.61418C16.4999 3.05347 16.2773 2.5157 15.8808 2.11917C15.4844 1.72263 14.9467 1.49983 14.386 1.49976C13.8253 1.49969 13.2875 1.72236 12.891 2.11879L2.88145 12.1305C2.70732 12.3042 2.57854 12.5179 2.50645 12.753L1.5157 16.017C1.49632 16.0819 1.49485 16.1508 1.51146 16.2164C1.52807 16.2821 1.56214 16.342 1.61005 16.3898C1.65796 16.4376 1.71792 16.4716 1.78357 16.4881C1.84922 16.5046 1.91812 16.503 1.98295 16.4835L5.2477 15.4935C5.48258 15.4221 5.69633 15.2941 5.8702 15.1208L15.8805 5.10904Z" stroke="#717182" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="error-email" role="alert"></span>
        </div>
      </div>

      <div class="password-section">
        <div class="password-row">
          <div class="password-info">
            <div class="password-icon-circle" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.8333 9.16675H4.16667C3.24619 9.16675 2.5 9.91294 2.5 10.8334V16.6667C2.5 17.5872 3.24619 18.3334 4.16667 18.3334H15.8333C16.7538 18.3334 17.5 17.5872 17.5 16.6667V10.8334C17.5 9.91294 16.7538 9.16675 15.8333 9.16675Z" stroke="white" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5.83337 9.16675V5.83341C5.83337 4.72835 6.27236 3.66854 7.05376 2.88714C7.83516 2.10573 8.89497 1.66675 10 1.66675C11.1051 1.66675 12.1649 2.10573 12.9463 2.88714C13.7277 3.66854 14.1667 4.72835 14.1667 5.83341V9.16675" stroke="white" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="password-label">Senha</span>
          </div>
          <button class="btn-change-password" type="button" id="btn-open-alterar-senha">
            Alterar Senha
          </button>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn-discard" type="button" id="btn-discard">
          Descartar Alterações
        </button>
        <button class="btn-save" type="button" id="btn-save" disabled aria-disabled="true">
          Salvar
        </button>
      </div>
    </section>

    <div class="signout-wrapper">
      <button class="btn-signout" type="button" id="btn-signout" aria-label="Sair da conta">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7.5 17.5H4.16667C3.72464 17.5 3.30072 17.3244 2.98816 17.0118C2.67559 16.6993 2.5 16.2754 2.5 15.8333V4.16667C2.5 3.72464 2.67559 3.30072 2.98816 2.98816C3.30072 2.67559 3.72464 2.5 4.16667 2.5H7.5" stroke="#D4183D" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.3334 14.1666L17.5 9.99992L13.3334 5.83325" stroke="#D4183D" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17.5 10H7.5" stroke="#D4183D" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Sair da Conta</span>
      </button>
    </div>

  </main>
</div>
